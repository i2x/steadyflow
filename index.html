<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>steadyflow</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI',
               'Noto Sans Thai', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #c8c1b6;
  color: #1c1914;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── BLOBS ───────────────────────────────────── */
.blobs { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.b {
  position: absolute; border-radius: 50%;
  filter: blur(88px);
}
.b1 { width: 600px; height: 560px; top: -140px; right: -100px;
      background: radial-gradient(circle, #c8724a 10%, transparent 62%); opacity: 0.72; }
.b2 { width: 500px; height: 560px; top: 18%; left: -130px;
      background: radial-gradient(circle, #5694b8 10%, transparent 62%); opacity: 0.6; }
.b3 { width: 420px; height: 400px; bottom: -100px; right: -20px;
      background: radial-gradient(circle, #469e88 10%, transparent 62%); opacity: 0.55; }

/* ── HEADER ──────────────────────────────────── */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  padding: 18px 28px;
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(255, 255, 255, 0.14);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid rgba(255, 255, 255, 0.22);
  pointer-events: none;
}
.logo { font-size: 13px; font-weight: 600; letter-spacing: -0.3px; color: rgba(28,25,20,0.85); }
#navDate { font-size: 12px; color: rgba(28,25,20,0.58); }

/* ── TRACK ───────────────────────────────────── */
.track {
  position: relative; z-index: 1;
  max-width: 520px;
  margin: 0 auto;
  padding: 92px 20px 160px 48px;
}

/* spine */
.track::before {
  content: '';
  position: absolute;
  left: 24px;
  top: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    rgba(255,255,255,0.5) 8%,
    rgba(255,255,255,0.5) 92%,
    transparent 100%
  );
}

/* ── STOP — glass card ───────────────────────── */
.stop {
  position: relative;
  margin-bottom: 9px;
  padding: 14px 18px;
  background: rgba(255, 255, 255, 0.28);
  backdrop-filter: blur(16px) saturate(160%);
  -webkit-backdrop-filter: blur(16px) saturate(160%);
  border: none;
  border-radius: 18px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  transition: opacity 0.3s;
}

/* dot on spine */
.stop::before {
  content: '';
  position: absolute;
  left: -24px;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.45);
  border: 1px solid rgba(255, 255, 255, 0.65);
}

.s-row { display: flex; align-items: baseline; gap: 14px; }
.s-ticker {
  font-family: Georgia, serif;
  font-size: 18px; font-weight: 700;
  letter-spacing: -0.3px;
  min-width: 3ch;
}
.s-date { font-size: 13px; color: rgba(28,25,20,0.65); }
.s-sub  { font-size: 12px; color: rgba(28,25,20,0.58); margin-top: 5px; }

/* ── PAST ──────────────────────────────────── */
.stop.past { opacity: 0.55; filter: blur(1.2px); }
.stop.past + .stop.past { opacity: 0.32; filter: blur(2px); }

/* ── CURRENT ──────────────────────────────── */
.stop.now {
  background: rgba(255, 255, 255, 0.38);
  border: none;
  box-shadow: 0 4px 28px rgba(0,0,0,0.12);
  filter: none;
}
.stop.now .s-ticker { font-size: 22px; }
.stop.now .s-date   { font-size: 15px; font-weight: 600; color: rgba(28,25,20,0.85); }
.stop.now .s-sub    { font-size: 13px; color: rgba(28,25,20,0.7); }
.stop.now::before {
  width: 9px; height: 9px;
  background: rgba(28,25,20,0.72);
  border-color: rgba(255,255,255,0.7);
  box-shadow: 0 0 0 2.5px rgba(255,255,255,0.22);
}
.stop.now .s-date { color: rgba(28,25,20,0.75); font-weight: 500; }
.braille-ptr {
  font-family: monospace;
  font-size: 12px;
  color: rgba(28,25,20,0.5);
  margin-left: 4px;
  user-select: none;
}
.s-countdown {
  font-family: 'SF Mono', 'Fira Mono', 'Courier New', monospace;
  font-size: 12px; color: rgba(28,25,20,0.55);
  margin-top: 5px; letter-spacing: 0.03em;
}

/* ── FUTURE ──────────────────────────────── */
.stop.future { opacity: 0.6; filter: blur(1.2px); }
.stop.future + .stop.future { opacity: 0.38; filter: blur(2px); }
.stop.future + .stop.future + .stop.future { opacity: 0.22; filter: blur(3px); }

/* ── FADE FOOTER ─────────────────────────────── */
.fade-out {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  height: 120px;
  background: linear-gradient(to bottom, transparent, rgba(200,193,182,0.96) 88%);
  pointer-events: none;
}
.bottom-label {
  position: fixed; bottom: 18px; left: 0; right: 0; z-index: 11;
  text-align: center;
  font-size: 11px; color: rgba(28,25,20,0.2);
  letter-spacing: 0.06em;
}
</style>
</head>
<body>

<div class="blobs" aria-hidden="true">
  <div class="b b1"></div>
  <div class="b b2"></div>
  <div class="b b3"></div>
</div>

<header>
  <div class="logo">steadyflow</div>
  <div id="navDate"></div>
</header>

<div class="track" id="track"></div>

<div class="fade-out"></div>
<div class="bottom-label">· · ·</div>

<script>
const ANCHOR  = new Date('2026-03-16T00:00:00');
const CYCLE   = ['BIP','ENB','KMI','DUK'];
const THAI_M  = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const DAYS_TH = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];

const STOCKS = {
  BIP: { name:'Brookfield Infrastructure Partners', desc:'infrastructure โครงสร้างพื้นฐาน 30 ประเทศ', color:'#b06a42' },
  ENB: { name:'Enbridge',                            desc:'ท่อน้ำมัน/ก๊าซใหญ่สุดในอเมริกาเหนือ',      color:'#6a6aaa' },
  KMI: { name:'Kinder Morgan',                      desc:'ท่อก๊าซสหรัฐ รับ AI datacenter demand',   color:'#3f7f7a' },
  DUK: { name:'Duke Energy',                        desc:'ไฟฟ้า regulated monopoly 100 ปีไม่ขาด',   color:'#6a8a4a' },
};

function monday(d) {
  const r = new Date(d); r.setHours(0,0,0,0);
  const day = r.getDay();
  r.setDate(r.getDate() + (day===0 ? -6 : 1-day));
  return r;
}
function wkNum(d)  { return Math.floor((monday(d)-ANCHOR)/6048e5)+1; }
function wkDate(n) { const d=new Date(ANCHOR); d.setDate(d.getDate()+(n-1)*7); return d; }
function ticker(n) { return CYCLE[((n-1)%4+4)%4]; }
function fmt(d)    { return `${d.getDate()} ${THAI_M[d.getMonth()]} ${String(d.getFullYear()+543).slice(-2)}`; }
function fmtFull(d){ return `${d.getDate()} ${THAI_M[d.getMonth()]} ${d.getFullYear()+543}`; }

function render() {
  const today = new Date(); today.setHours(0,0,0,0);
  const mon   = monday(today);
  const curWn = Math.max(1, wkNum(today));
  const cycN  = Math.ceil(curWn/4);
  const posN  = ((curWn-1)%4)+1;

  // nav date
  document.getElementById('navDate').textContent =
    `${DAYS_TH[today.getDay()]} ${fmtFull(today)}`;

  const track = document.getElementById('track');
  track.innerHTML = '';

  const startWn = curWn - 2;
  const endWn   = curWn + 2;

  for (let wn=startWn; wn<=endWn; wn++) {
    const d     = wkDate(wn);
    const tk    = ticker(wn);
    const s     = STOCKS[tk];
    const isNow  = wn === curWn;
    const isPast = wn < curWn;

    const stop = document.createElement('div');

    const cls = isNow ? 'now' : isPast ? 'past' : 'future';
    stop.className = `stop ${cls}`;

    const row = `
      <div class="s-row">
        <span class="s-ticker" style="color:${s.color}">${tk}</span>
        <span class="s-date">${fmt(d)}</span>
      </div>`;

    if (isNow) {
      const cn = Math.ceil(wn/4);
      stop.innerHTML = `
        <div class="s-row">
          <span class="s-ticker" style="color:${s.color}">${tk}</span>
          <span class="s-date">${fmt(d)}</span>
        </div>
        <div class="s-sub">รอบ ${cn} · ${s.name}</div>
        <div class="s-countdown"><span class="braille-ptr" id="braille-ptr">⠁</span> <span id="countdown">—</span></div>`;
    } else {
      stop.innerHTML = row;
    }

    track.appendChild(stop);
  }

}

document.addEventListener('DOMContentLoaded', () => {
  render();
  initBraillePtr();
  initCountdown();
});

// ── BRAILLE POINTER SPINNER ────────────────────
function initBraillePtr() {
  // clock: single dot rotates clockwise around perimeter — reads like a ticking second hand
  const frames = ['⠁','⠈','⠐','⠠','⢀','⡀','⠄','⠂'];
  let i = 0;
  setInterval(() => {
    const el = document.getElementById('braille-ptr');
    if (el) el.textContent = frames[i % frames.length];
    i++;
  }, 100);
}

// ── COUNTDOWN ─────────────────────────────────
function initCountdown() {
  function nextMonday() {
    const d = new Date();
    const day = d.getDay();
    const add = day === 1 ? 7 : day === 0 ? 1 : 8 - day;
    d.setDate(d.getDate() + add);
    d.setHours(0, 0, 0, 0);
    return d;
  }

  function tick() {
    const el = document.getElementById('countdown');
    if (!el) return;
    const diff = nextMonday() - Date.now();
    if (diff <= 0) { el.textContent = 'วันนี้วันจันทร์'; return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000)  / 60000);
    const s = Math.floor((diff % 60000)    / 1000);
    const pad = n => String(n).padStart(2, '0');
    el.textContent = d > 0
      ? `${d} วัน ${pad(h)}:${pad(m)}:${pad(s)}`
      : `${pad(h)}:${pad(m)}:${pad(s)}`;
  }

  tick();
  setInterval(tick, 1000);
}
</script>
</body>
</html>
